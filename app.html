<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katachi - Kitchen OS</title>
    
    <!-- Achievement System CSS -->
    <link rel="stylesheet" href="css/achievements.css">
    
    <style>
        /* Katachi - Main Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --scarlet: #BE0000;
            --gold: #C4A600;
            --dark-scarlet: #8B0000;
            --warm-bg: #fefbf7;
            --border: #f5ede5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fefbf7 0%, #f5ede5 50%, #ede2d9 100%);
            min-height: 100vh;
            color: #2d1810;
        }

        /* Navigation */
        .main-nav {
            background: white;
            border-bottom: 2px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-logo {
            width: 40px;
            height: 40px;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--scarlet);
            letter-spacing: 0.05em;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            text-decoration: none;
            color: #2d1810;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .nav-link:hover {
            background: rgba(190, 0, 0, 0.1);
            color: var(--scarlet);
        }

        .nav-link.active {
            background: var(--scarlet);
            color: white;
        }

        .nav-language {
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--gold);
            background: white;
            color: #2d1810;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: rgba(196, 166, 0, 0.1);
        }

        .lang-btn.active {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        /* Main Content */
        .main-content {
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .module-container {
            min-height: 400px;
        }

        /* Buttons */
        .btn-primary {
            background: var(--scarlet);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: var(--dark-scarlet);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(190, 0, 0, 0.2);
        }

        .btn-secondary {
            background: white;
            color: var(--scarlet);
            border: 2px solid var(--scarlet);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: var(--scarlet);
            color: white;
        }

        /* Empty States */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: #2d1810;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: rgba(45, 24, 16, 0.6);
            margin-bottom: 2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-nav {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links {
                width: 100%;
                flex-direction: column;
            }

            .nav-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-brand">
            <img src="assets/katachi-logo-v3-fixed.svg" alt="Katachi" class="nav-logo" onerror="this.style.display='none'">
            <span class="brand-name">katachi</span>
        </div>
        <div class="nav-links">
            <a class="nav-link" data-module="recipes" data-en="📖 Recipes" data-ja="📖 レシピ">📖 Recipes</a>
            <a class="nav-link" data-module="prep-lists" data-en="📋 Prep Lists" data-ja="📋 準備リスト">📋 Prep Lists</a>
            <a class="nav-link" data-module="inventory" data-en="📦 Inventory" data-ja="📦 在庫">📦 Inventory</a>
            <a class="nav-link" data-module="orders" data-en="📲 Orders" data-ja="📲 注文">📲 Orders</a>
            <a class="nav-link" data-module="vendors" data-en="🏭 Vendors" data-ja="🏭 仕入先">🏭 Vendors</a>
            <a class="nav-link" data-module="costing" data-en="💰 Costing" data-ja="💰 原価計算">💰 Costing</a>
            <a class="nav-link" data-module="pricing" data-en="🏷️ Pricing" data-ja="🏷️ 価格設定">🏷️ Pricing</a>
            <a class="nav-link" data-module="team" data-en="👥 Team" data-ja="👥 チーム">👥 Team</a>
            <a class="nav-link" data-module="standards" data-en="✓ Standards" data-ja="✓ 基準">✓ Standards</a>
            <a class="nav-link" data-module="analytics" data-en="📊 Analytics" data-ja="📊 分析">📊 Analytics</a>
            <a class="nav-link" data-module="settings" data-en="⚙️ Settings" data-ja="⚙️ 設定">⚙️ Settings</a>
        </div>
        <div class="nav-language">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="ja">日本語</button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <div id="recipes-container" class="module-container">
            <div id="recipeList"></div>
        </div>
        <div id="prep-lists-container" class="module-container" style="display: none;"></div>
        <div id="inventory-container" class="module-container" style="display: none;"></div>
        <div id="orders-container" class="module-container" style="display: none;"></div>
        <div id="vendors-container" class="module-container" style="display: none;"></div>
        <div id="costing-container" class="module-container" style="display: none;"></div>
        <div id="pricing-container" class="module-container" style="display: none;"></div>
        <div id="team-container" class="module-container" style="display: none;"></div>
        <div id="standards-container" class="module-container" style="display: none;"></div>
        <div id="analytics-container" class="module-container" style="display: none;"></div>
        <div id="settings-container" class="module-container" style="display: none;"></div>
    </main>

    <!-- Scripts: Achievement System FIRST, then modules -->
    <script src="js/achievements.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/prepLists.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/vendors.js"></script>
    <script src="js/costing.js"></script>
    <script src="js/pricing.js"></script>
    <script src="js/team.js"></script>
    <script src="js/standards.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/settings.js"></script>

    <!-- App Logic -->
    <script>
        // Wait for all modules to load
        window.addEventListener('load', () => {
            console.log('🚀 Katachi app loaded');

            // Initialize routing
            initializeRouting();
            
            // Initialize language toggle
            initializeLanguageToggle();

            // Trigger initial render for all modules
            renderAllModules();

            // Load initial module
            const initialModule = window.location.hash.substring(1) || 'analytics';
            navigate(initialModule);
        });

        function renderAllModules() {
            // Call render functions for each module if they exist
            if (typeof Recipes !== 'undefined' && Recipes.renderRecipeList) {
                Recipes.renderRecipeList();
            }
            if (typeof PrepListsModule !== 'undefined' && PrepListsModule.renderPrepListsView) {
                PrepListsModule.renderPrepListsView();
            }
            if (typeof InventoryModule !== 'undefined' && InventoryModule.renderInventoryView) {
                InventoryModule.renderInventoryView();
            }
            if (typeof OrdersModule !== 'undefined' && OrdersModule.renderOrdersView) {
                OrdersModule.renderOrdersView();
            }
            if (typeof VendorsModule !== 'undefined' && VendorsModule.renderVendorsView) {
                VendorsModule.renderVendorsView();
            }
            if (typeof CostingModule !== 'undefined' && CostingModule.renderCostingView) {
                CostingModule.renderCostingView();
            }
            if (typeof PricingModule !== 'undefined' && PricingModule.renderPricingView) {
                PricingModule.renderPricingView();
            }
            if (typeof TeamModule !== 'undefined' && TeamModule.renderTeamView) {
                TeamModule.renderTeamView();
            }
            if (typeof StandardsModule !== 'undefined' && StandardsModule.renderStandardsView) {
                StandardsModule.renderStandardsView();
            }
            if (typeof AnalyticsModule !== 'undefined' && AnalyticsModule.renderAnalyticsView) {
                AnalyticsModule.renderAnalyticsView();
            }
            if (typeof SettingsModule !== 'undefined' && SettingsModule.renderSettingsView) {
                SettingsModule.renderSettingsView();
                SettingsModule.attachEventListeners();
            }
        }

        function initializeRouting() {
            // Handle navigation clicks
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const module = link.dataset.module;
                    window.location.hash = module;
                    navigate(module);
                });
            });

            // Handle hash changes
            window.addEventListener('hashchange', () => {
                const module = window.location.hash.substring(1) || 'analytics';
                navigate(module);
            });
        }

        function navigate(module) {
            // Hide all containers
            document.querySelectorAll('.module-container').forEach(c => c.style.display = 'none');
            
            // Show selected container
            const container = document.getElementById(module + '-container');
            if (container) {
                container.style.display = 'block';
            }

            // Update active nav link
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.querySelector(`[data-module="${module}"]`);
            if (activeLink) activeLink.classList.add('active');
        }

        function initializeLanguageToggle() {
            const savedLang = localStorage.getItem('katachi-language') || 'en';
            setLanguage(savedLang);

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const lang = btn.dataset.lang;
                    setLanguage(lang);
                });
            });
        }

        function setLanguage(lang) {
            // Update active button
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.lang-btn[data-lang="${lang}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            
            // Update all bilingual elements
            document.querySelectorAll('[data-en][data-ja]').forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) {
                    el.textContent = text;
                }
            });
            
            // Save preference
            localStorage.setItem('katachi-language', lang);
            
            console.log(`🌐 Language switched to ${lang}`);
        }
    </script>
</body>
</html>
