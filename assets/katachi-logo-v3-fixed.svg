<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="white"/>
  
  <!-- Outer Red Ring -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#BE0000" stroke-width="5"/>
  
  <!-- Inner Gold Ring -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="#C4A600" stroke-width="1.5"/>
  
  <!-- Kanji -->
  <text x="200" y="175" font-size="100" font-weight="300" fill="#BE0000" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">形</text>
  
  <!-- Text (Raised 15px) -->
  <text x="200" y="255" font-size="32" font-weight="400" fill="#BE0000" text-anchor="middle" dominant-baseline="middle" letter-spacing="8" font-family="system-ui, -apple-system, sans-serif">katachi</text>
</svg>
