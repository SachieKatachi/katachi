<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katachi - Coming Soon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fefbf7 0%, #f5ede5 50%, #ede2d9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 2rem;
        }

        .logo-badge {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .logo-badge:hover {
            transform: scale(1.02);
        }

        .logo-badge.wiggle {
            animation: wiggle 0.3s ease-in-out;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg); }
            75% { transform: rotate(2deg); }
        }

        .logo-outer {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 3px solid #be0000;
            border-radius: 50%;
            top: 0;
            left: 0;
        }

        .logo-inner {
            position: absolute;
            width: 160px;
            height: 160px;
            border: 1px solid #c4a600;
            border-radius: 50%;
            top: 20px;
            left: 20px;
        }

        .logo-kanji {
            font-size: 60px;
            color: #be0000;
            font-weight: 300;
            position: relative;
            z-index: 10;
            margin-top: -8px;
        }

        .logo-text {
            font-size: 22px;
            color: #be0000;
            font-weight: 400;
            position: relative;
            z-index: 10;
            letter-spacing: 0.12em;
            margin-top: 8px;
        }

        .logo-counter {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(190, 0, 0, 0.4);
            font-weight: 500;
            opacity: 0;
        }

        h1 {
            font-size: 2.5rem;
            color: #2d1810;
            margin-bottom: 0.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .tagline {
            font-size: 1rem;
            color: #8b0000;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .description {
            font-size: 0.95rem;
            color: rgba(45, 24, 16, 0.7);
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .email-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #c4a600;
            border-radius: 4px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.8);
            color: #2d1810;
            font-family: inherit;
            transition: all 0.3s;
        }

        .email-input:focus {
            outline: none;
            border-color: #be0000;
            box-shadow: 0 0 0 3px rgba(190, 0, 0, 0.1);
        }

        .email-input::placeholder {
            color: rgba(45, 24, 16, 0.4);
        }

        .submit-btn {
            width: 100%;
            padding: 12px 24px;
            background: #be0000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.05em;
        }

        .submit-btn:hover {
            background: #8b0000;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(190, 0, 0, 0.2);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: rgba(75, 175, 75, 0.1);
            color: #2d5a2d;
            border: 1px solid rgba(75, 175, 75, 0.3);
            display: block;
        }

        .message.error {
            background: rgba(190, 0, 0, 0.1);
            color: #8b0000;
            border: 1px solid rgba(190, 0, 0, 0.3);
            display: block;
        }

        .admin-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(190, 0, 0, 0.2);
        }

        .admin-field {
            display: none;
            margin-bottom: 1.5rem;
        }

        .admin-field.visible {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        .admin-label {
            display: block;
            font-size: 0.85rem;
            color: rgba(45, 24, 16, 0.6);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .admin-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #c4a600;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: monospace;
            background: rgba(255, 255, 255, 0.6);
            color: #2d1810;
            margin-bottom: 0.75rem;
        }

        .admin-input:focus {
            outline: none;
            border-color: #be0000;
        }

        .admin-btn {
            width: 100%;
            padding: 10px;
            background: rgba(190, 0, 0, 0.1);
            color: #be0000;
            border: 1px solid #be0000;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .admin-btn:hover {
            background: #be0000;
            color: white;
        }

        .achievement-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #be0000 0%, #8b0000 100%);
            color: white;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            display: none;
            z-index: 1000;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 90%;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .achievement-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .achievement-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .achievement-subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo-badge" id="logoBadge">
                <div class="logo-outer"></div>
                <div class="logo-inner"></div>
                <div class="logo-kanji">形</div>
                <div class="logo-text">katachi</div>
                <div class="logo-counter" id="logoCounter"></div>
            </div>
        </div>

        <h1>katachi</h1>
        <div class="tagline">Coming Soon</div>
        
        <div class="description">
            The kitchen operating system for chefs. Join our waitlist for early access.
        </div>

        <form id="waitlistForm">
            <div class="form-group">
                <input
                    type="email"
                    id="emailInput"
                    class="email-input"
                    placeholder="your@email.com"
                    required
                >
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Join Waitlist</button>
            <div id="message" class="message"></div>
        </form>

        <div class="admin-section">
            <div class="admin-field" id="adminField">
                <label class="admin-label">Admin Password</label>
                <input
                    type="password"
                    id="adminPassword"
                    class="admin-input"
                    placeholder="Enter password"
                >
                <button type="button" class="admin-btn" id="adminBtn">Access Dashboard</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="achievement-popup" id="achievementPopup">
        <div class="achievement-emoji">🔓</div>
        <div class="achievement-title">ACHIEVEMENT UNLOCKED</div>
        <div class="achievement-subtitle">The Form Seeker</div>
    </div>

    <script>
        let logoClicks = 0;
        const logoBadge = document.getElementById('logoBadge');
        const logoCounter = document.getElementById('logoCounter');
        const adminField = document.getElementById('adminField');
        const achievementPopup = document.getElementById('achievementPopup');
        const overlay = document.getElementById('overlay');
        const ADMIN_PASSWORD = 'Taiyaki@2ndStreet';

        // Initialize Supabase
        const supabaseUrl = 'https://gxqmyiwzyueyalfanton.supabase.co';
        const supabaseKey = 'sb_publishable_lAB7aXd0ZnsHHTCFs426yA_YUK_kmsx';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Logo easter egg
        logoBadge.addEventListener('click', () => {
            logoClicks++;
            logoBadge.classList.add('wiggle');
            setTimeout(() => logoBadge.classList.remove('wiggle'), 300);
            
            logoCounter.textContent = `${logoClicks}/5`;
            logoCounter.style.opacity = logoClicks > 0 ? '1' : '0';

            if (logoClicks === 5) {
                showAchievement();
                adminField.classList.add('visible');
            }
        });

        function showAchievement() {
            overlay.classList.add('active');
            achievementPopup.style.display = 'block';
            setTimeout(() => {
                overlay.classList.remove('active');
                achievementPopup.style.display = 'none';
            }, 3000);
        }

        // Waitlist form
        const waitlistForm = document.getElementById('waitlistForm');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        waitlistForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();

            if (!email) {
                showMessage('Please enter an email address', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Joining...';

            try {
                // Check if email already exists
                const { data: existing } = await supabaseClient
                    .from('waitlist')
                    .select('id')
                    .eq('email', email)
                    .single();

                if (existing) {
                    showMessage('You\'re already on the waitlist! 🎉', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Join Waitlist';
                    return;
                }

                // Add new email to waitlist
                const { error } = await supabaseClient
                    .from('waitlist')
                    .insert([{ email }]);

                if (error) {
                    console.error('Error:', error);
                    showMessage('Something went wrong. Please try again.', 'error');
                } else {
                    showMessage('✨ Welcome to the waitlist!', 'success');
                    emailInput.value = '';
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('Connection error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Join Waitlist';
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 4000);
        }

        // Admin password
        const adminPassword = document.getElementById('adminPassword');
        const adminBtn = document.getElementById('adminBtn');

        adminBtn.addEventListener('click', () => {
            if (adminPassword.value === ADMIN_PASSWORD) {
                sessionStorage.setItem('katachi_admin', 'true');
                showMessage('✅ Admin access granted! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'landing-minimal-logo-focus.html';
                }, 1500);
            } else {
                showMessage('❌ Invalid password', 'error');
                adminPassword.value = '';
            }
        });

        console.log('Katachi Coming Soon - Ready 🚀');
    </script>
</body>
</html>
