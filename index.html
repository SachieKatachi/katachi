<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katachi - Kitchen Operations</title>
  
  <!-- CSS IMPORTS -->
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/auth.css">
</head>
<body>
  <!-- ROOT CONTAINER -->
  <div id="root"></div>

  <!-- LANDING PAGE SCREEN -->
  <div id="s-land" class="screen active">
    <div class="landing-container">
      <div class="landing-content">
        <div class="logo-circle">
          <span class="logo-text">形</span>
        </div>
        <h1 class="brand-name">katachi</h1>
        <p class="brand-subtitle">形</p>
        <p class="brand-description">Recipe management, kitchen prep, and ordering<br>built for the precision of professional craft.</p>
        
        <div class="cta-buttons">
          <button class="btn btn-primary" data-action="nav-auth">Start Free Trial</button>
          <button class="btn btn-secondary" data-action="nav-signin">Sign In</button>
        </div>
        
        <div class="pricing-info">
          <span class="tier-badge">Free Forever</span>
          <span class="tier-badge">Pro $29</span>
          <span class="tier-badge">Growth $59</span>
          <span class="tier-badge multi">Multi $149</span>
        </div>
        
        <p class="trial-text">14-day free trial · No credit card required · English & 日本語</p>
      </div>
    </div>
  </div>

  <!-- AUTH PAGE SCREEN -->
  <div id="s-auth" class="screen" style="display: none;">
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-header">
          <h2>Sign Up / Sign In</h2>
          <button class="back-btn" data-action="nav-land" type="button">← Back</button>
        </div>
        
        <form id="authForm" class="auth-form">
          <!-- NAME FIELD (Signup only) -->
          <div id="nameField" class="form-group" style="display: none;">
            <label for="authName">Full Name</label>
            <input type="text" id="authName" placeholder="Chef Alice">
            <div id="nameError" class="error-message"></div>
          </div>
          
          <!-- EMAIL FIELD -->
          <div class="form-group">
            <label for="authEmail">Email</label>
            <input type="email" id="authEmail" placeholder="chef@restaurant.com" required>
            <div id="emailError" class="error-message"></div>
          </div>
          
          <!-- PASSWORD FIELD -->
          <div class="form-group">
            <label for="authPassword">Password</label>
            <input type="password" id="authPassword" placeholder="••••••••" required>
            <div id="passwordError" class="error-message"></div>
          </div>
          
          <!-- PASSWORD CONFIRM (Signup only) -->
          <div id="passwordConfirmField" class="form-group" style="display: none;">
            <label for="authPasswordConfirm">Confirm Password</label>
            <input type="password" id="authPasswordConfirm" placeholder="••••••••">
            <div id="passwordConfirmError" class="error-message"></div>
          </div>
          
          <!-- SUBMIT BUTTON -->
          <button type="submit" class="btn btn-primary btn-full" id="authSubmitBtn">Sign Up</button>
        </form>
        
        <!-- TAB TOGGLE -->
        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-tab="signup" data-action="signup-tab">Sign Up</button>
          <button type="button" class="auth-tab" data-tab="login" data-action="login-tab">Sign In</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LANGUAGE SELECT SCREEN -->
  <div id="s-lang" class="screen" style="display: none;">
    <div class="lang-container">
      <div class="lang-box">
        <h2>Select Language</h2>
        <button class="btn btn-large" data-action="lang-select" data-lang="en">English</button>
        <button class="btn btn-large" data-action="lang-select" data-lang="ja">日本語</button>
      </div>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="s-app" class="screen" style="display: none;">
    <div class="app-layout">
      <header class="app-header">
        <h1>Katachi</h1>
        <button type="button" class="btn btn-small" data-action="logout">Logout</button>
      </header>
      <main class="app-content">
        <p>Welcome to Katachi App</p>
      </main>
    </div>
  </div>

  <!-- MODALS CONTAINER -->
  <div id="modalsContainer"></div>

  <!-- MODULAR JAVASCRIPT IMPORTS (CORRECT ORDER) -->
  <script src="./js/config.js"></script>
  <script src="./js/utilities.js"></script>
  <script src="./js/emailAuth.js"></script>
  <script src="./js/state.js"></script>
  <script src="./js/router.js"></script>
  <script src="./js/app.js"></script>
  
  <!-- Form submission handler -->
  <script>
    window.handleAuthSubmit = async function(e) {
      e.preventDefault();
      
      if (window.Logger) {
        window.Logger.info('Form submitted');
      }
      
      const isSignup = document.getElementById('authSubmitBtn').textContent === 'Sign Up';
      
      if (isSignup) {
        // SIGNUP FLOW
        const name = document.getElementById('authName').value.trim();
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        const passwordConfirm = document.getElementById('authPasswordConfirm').value;
        
        if (!name || !email || !password || !passwordConfirm) {
          alert('Please fill in all fields');
          return;
        }
        
        if (password !== passwordConfirm) {
          alert('Passwords do not match');
          return;
        }
        
        if (window.Logger) {
          window.Logger.info('Signup attempt', { email, name });
        }
        
        // Call signup
        if (window.EmailAuth && typeof window.EmailAuth.signup === 'function') {
          const result = await window.EmailAuth.signup({ name, email, password });
          
          if (window.Logger) {
            window.Logger.info('Signup result', { success: result.success, error: result.error });
          }
          
          if (result.success) {
            if (window.AuthState && typeof window.AuthState.setUser === 'function') {
              window.AuthState.setUser(result.user);
            }
            if (window.Router && typeof window.Router.goToScreen === 'function') {
              window.Router.goToScreen('s-lang');
            }
          } else {
            alert('Signup failed: ' + (result.error || 'Unknown error'));
          }
        } else {
          alert('EmailAuth module not loaded');
        }
      } else {
        // LOGIN FLOW
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        
        if (!email || !password) {
          alert('Please fill in all fields');
          return;
        }
        
        if (window.Logger) {
          window.Logger.info('Login attempt', { email });
        }
        
        // Call login
        if (window.EmailAuth && typeof window.EmailAuth.login === 'function') {
          const result = await window.EmailAuth.login(email, password);
          
          if (window.Logger) {
            window.Logger.info('Login result', { success: result.success, error: result.error });
          }
          
          if (result.success) {
            if (window.AuthState && typeof window.AuthState.setUser === 'function') {
              window.AuthState.setUser(result.user);
            }
            if (window.Router && typeof window.Router.goToScreen === 'function') {
              window.Router.goToScreen('s-lang');
            }
          } else {
            alert('Login failed: ' + (result.error || 'Unknown error'));
          }
        } else {
          alert('EmailAuth module not loaded');
        }
      }
    };

    // Attach form handler when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      const authForm = document.getElementById('authForm');
      if (authForm) {
        authForm.addEventListener('submit', window.handleAuthSubmit);
        if (window.Logger) {
          window.Logger.info('Form handler attached');
        }
      } else {
        console.error('authForm not found');
      }
    });
  </script>

</body>
</html>
